<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typer — シンプルなテキストエディタ</title>
    <meta name="description" content="シンプルで使いやすいテキストエディタ。文字数・単語数カウント、コピー、集中モードに対応。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Particle layer (invisible when effects off) -->
    <canvas id="particle-canvas"></canvas>
    <!-- Flash overlay -->
    <div id="flash-overlay"></div>

    <div id="app">

      <!-- ===== Toolbar ===== -->
      <header id="toolbar">
        <div class="toolbar-left">
          <span id="app-title">Typer</span>
          <span class="toolbar-divider"></span>
          <span id="doc-status" class="doc-status">新規ドキュメント</span>
        </div>
        <div class="toolbar-right">
          <button class="tool-btn" id="btn-focus" title="集中モード (F11)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
          <button class="tool-btn" id="btn-copy" title="コピー">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="tool-btn" id="btn-clear" title="クリア">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
          <div class="toolbar-divider"></div>
          <button class="tool-btn" id="btn-settings" title="設定">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- ===== Editor ===== -->
      <main id="editor-area">
        <textarea
          id="editor"
          placeholder="書き始めてください..."
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
        ></textarea>
      </main>

      <!-- ===== Status bar ===== -->
      <footer id="statusbar">
        <div class="status-left">
          <span id="stat-chars">0 文字</span>
          <span class="status-sep">·</span>
          <span id="stat-words">0 単語</span>
          <span class="status-sep">·</span>
          <span id="stat-lines">1 行</span>
        </div>
        <div class="status-right">
          <!-- Effect indicators (subtle, only visible when on) -->
          <span id="effect-indicator" class="effect-indicator" title="エフェクト設定">
            <span id="effect-dot"></span>
            <span id="effect-label">エフェクト: OFF</span>
          </span>
        </div>
      </footer>

    </div><!-- /#app -->

    <!-- ===== Settings Panel ===== -->
    <div id="settings-overlay"></div>
    <aside id="settings-panel">
      <div class="settings-header">
        <span class="settings-title">設定</span>
        <button id="btn-settings-close" class="settings-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="settings-body">

        <!-- Editor settings -->
        <section class="settings-section">
          <h3 class="settings-section-title">エディタ</h3>

          <div class="settings-row">
            <label class="settings-label">
              <span>フォント</span>
            </label>
            <select id="set-font" class="settings-select">
              <option value="jetbrains">JetBrains Mono</option>
              <option value="inter" selected>Inter (サンセリフ)</option>
              <option value="serif">Georgia (セリフ)</option>
            </select>
          </div>

          <div class="settings-row">
            <label class="settings-label">
              <span>文字サイズ</span>
            </label>
            <div class="range-row">
              <input type="range" id="set-fontsize" min="12" max="28" value="17" class="settings-range" />
              <span id="set-fontsize-val" class="range-val">17px</span>
            </div>
          </div>

          <div class="settings-row">
            <label class="settings-label">
              <span>行の幅</span>
            </label>
            <select id="set-width" class="settings-select">
              <option value="narrow">狭い (560px)</option>
              <option value="medium" selected>普通 (720px)</option>
              <option value="wide">広い (960px)</option>
              <option value="full">全幅</option>
            </select>
          </div>

          <div class="settings-row">
            <label class="settings-label">
              <span>テーマ</span>
            </label>
            <select id="set-theme" class="settings-select">
              <option value="light" selected>ライト</option>
              <option value="dark">ダーク</option>
              <option value="sepia">セピア</option>
            </select>
          </div>
        </section>

        <!-- Impact Effects section -->
        <section class="settings-section">
          <h3 class="settings-section-title">
            💥 Impact エフェクト
            <span class="settings-badge">隠し機能</span>
          </h3>
          <p class="settings-note">タイピングをハリウッド映画に変える機能です。</p>

          <div class="settings-row">
            <label class="settings-label" for="set-effects-master">
              <span>エフェクト全体</span>
              <small>ONにすると全機能が有効になります</small>
            </label>
            <label class="toggle" id="toggle-effects-master">
              <input type="checkbox" id="set-effects-master" />
              <span class="toggle-track"></span>
            </label>
          </div>

          <div id="effects-sub" class="effects-sub disabled">

            <div class="settings-row sub">
              <label class="settings-label" for="set-sound">
                <span>爆音</span>
                <small>キーを押すたびに鳴り響く</small>
              </label>
              <label class="toggle">
                <input type="checkbox" id="set-sound" checked />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-row sub">
              <label class="settings-label" for="set-particles">
                <span>パーティクル</span>
                <small>火花・衝撃波・紙吹雪</small>
              </label>
              <label class="toggle">
                <input type="checkbox" id="set-particles" checked />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-row sub">
              <label class="settings-label" for="set-shake">
                <span>画面シェイク</span>
                <small>打鍵ごとに画面が揺れる</small>
              </label>
              <label class="toggle">
                <input type="checkbox" id="set-shake" checked />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-row sub">
              <label class="settings-label" for="set-flash">
                <span>フラッシュ</span>
                <small>画面が閃光を放つ</small>
              </label>
              <label class="toggle">
                <input type="checkbox" id="set-flash" checked />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-row sub">
              <label class="settings-label" for="set-combo">
                <span>コンボ演出</span>
                <small>連続入力で激化する</small>
              </label>
              <label class="toggle">
                <input type="checkbox" id="set-combo" checked />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-row sub">
              <label class="settings-label">
                <span>爆音モード</span>
              </label>
              <select id="set-mode" class="settings-select small">
                <option value="explosion">💣 爆発</option>
                <option value="laser">⚡ レーザー</option>
                <option value="mechanical">⌨️ メカニカル</option>
                <option value="nuclear">☢️ 核爆発</option>
              </select>
            </div>

            <div class="settings-row sub">
              <label class="settings-label">
                <span>強度</span>
                <small>エフェクトの派手さ</small>
              </label>
              <div class="range-row">
                <input type="range" id="set-intensity" min="1" max="3" value="2" step="1" class="settings-range" />
                <span id="set-intensity-val" class="range-val">中</span>
              </div>
            </div>

          </div><!-- /#effects-sub -->
        </section>

        <!-- Stats (effect stats, visible only when effects on) -->
        <section class="settings-section" id="stats-section" style="display:none">
          <h3 class="settings-section-title">セッション統計</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-val" id="stat-combo-max">0</div>
              <div class="stat-name">最大コンボ</div>
            </div>
            <div class="stat-item">
              <div class="stat-val" id="stat-kps-max">0</div>
              <div class="stat-name">最大打鍵速度/秒</div>
            </div>
            <div class="stat-item">
              <div class="stat-val" id="stat-explosions">0</div>
              <div class="stat-name">爆発回数</div>
            </div>
          </div>
        </section>

      </div><!-- /.settings-body -->

      <div class="settings-footer">
        <span class="settings-version">Typer v1.0 · Impact Edition</span>
      </div>
    </aside>

    <!-- Combo popup (impact mode) -->
    <div id="combo-popup"></div>
    <!-- Achievement toast -->
    <div id="achievement-toast"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
